<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&amp;family=Gaegu:wght@300;400;700&amp;family=Short+Stack&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "sky-blue": "#BAE6FD",
                        "sunny-yellow": "#FEF08A",
                        "berry-pink": "#FBCFE8",
                        "grass-green": "#BBF7D0",
                        "ocean-blue": "#0EA5E9",
                        "cloud-white": "#F8FAFC",
                        "ink-black": "#1E293B",
                        "crayon-red": "#EF4444"
                    },
                    fontFamily: {
                        "display": ["Fredoka", "sans-serif"],
                        "handwriting": ["Nunito", "sans-serif"],
                        "sketch": ["Nunito", "sans-serif"]
                    },
                    borderRadius: {
                        "wiggly": "2rem 1rem 3rem 1.5rem",
                        "bubble": "4rem 4rem 4rem 4rem"
                    }
                },
            },
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .paper-texture {
                background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            }

            .sketch-border {
                border: 3px solid #1E293B;
                box-shadow: 6px 6px 0px #1E293B;
            }

            .floating-animation {
                animation: float 4s ease-in-out infinite;
            }

            @keyframes float {
                0%, 100% {
                    transform: translateY(0) rotate(-1deg);
                }

                50% {
                    transform: translateY(-10px) rotate(1deg);
                }
            }

            .wiggle-hover:hover {
                animation: wiggle 0.3s ease-in-out infinite;
            }

            @keyframes wiggle {
                0%, 100% {
                    transform: rotate(-2deg);
                }

                50% {
                    transform: rotate(2deg);
                }
            }
        }

        body {
            font-family: 'Fredoka', sans-serif;
            cursor: url('https://cdn-icons-png.flaticon.com/32/2529/2529241.png'), auto;
        }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
